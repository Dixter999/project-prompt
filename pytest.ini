[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test collection and running options
addopts = 
    -v 
    --cov=src 
    --cov-report=term-missing 
    --cov-report=html
    --cov-config=.coveragerc

# Filter warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::pytest.PytestUnknownMarkWarning
