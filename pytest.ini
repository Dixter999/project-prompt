[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_functions = test_*
python_classes = Test*

# Test collection and running options
addopts = -v

# Filter warnings
test_warning_checks = error
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::pytest.PytestUnknownMarkWarning

# Test coverage configuration (will be used only if pytest-cov is installed)
# These are commented out to prevent errors when pytest-cov is not installed
# --cov=src
# --cov-report=term-missing
# --cov-report=xml
