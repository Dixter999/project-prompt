name: Anthropic Verification

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'src/integrations/anthropic/**'
      - 'tests/anthropic/**'
      - '.github/workflows/verify-anthropic.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/integrations/anthropic/**'
      - 'tests/anthropic/**'
  workflow_dispatch:
    inputs:
      run_api_tests:
        description: 'Run tests with Anthropic API'
        required: true
        default: 'false'
        type: boolean
      project_types:
        description: 'Project types to test (comma separated)'
        required: false
        default: 'web-project'
        type: string

jobs:
  verify-anthropic:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Set Python Path
        run: |
          echo "PYTHONPATH=\$PYTHONPATH:\$(pwd)" >> \$GITHUB_ENV
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install keyring>=24.2.0  # Ensure keyring is installed first
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov
          pip install -e .
      
      - name: Set up environment variables
        if: github.event_name == 'workflow_dispatch' && inputs.run_api_tests == 'true'
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
      
      - name: Run unit tests
        run: |
          python -m pytest tests/unit/test_anthropic_integration.py -v
          
      - name: Run verification script (mock mode)
        # Simplified conditional
        run: |
          bash tests/run_anthropic_verification.sh --mock
