name: Anthropic Verification

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/integrations/anthropic/**'
      - 'tests/anthropic/**'
      - '.github/workflows/verify-anthropic.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/integrations/anthropic/**'
      - 'tests/anthropic/**'
  workflow_dispatch:
    inputs:
      run_api_tests:
        description: 'Run tests with Anthropic API'
        required: true
        default: 'false'
        type: boolean
      python_version:
        description: 'Python version to test with'
        required: false
        default: '3.11'
        type: string

jobs:
  verify-anthropic:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools-rust wheel
          
          # Install project dependencies
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          fi
          
          # Install development dependencies
          pip install pytest pytest-cov pytest-mock
          pip install -e .
      
      - name: Create project-output directory
        run: |
          mkdir -p project-output
          touch project-output/README.md
      
      - name: Set up environment variables
        if: github.event_name == 'workflow_dispatch' && inputs.run_api_tests == 'true'
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
      
      - name: Install test dependencies
        run: |
          python -m pip install pytest-cov
          
      - name: Run unit tests
        run: |
          python -m pytest tests/unit/test_anthropic_integration.py -v --cov=src --cov-report=term-missing --cov-report=xml
          
      - name: Run verification script (mock mode)
        if: github.event_name != 'workflow_dispatch' || inputs.run_api_tests == 'false'
        run: |
          bash tests/run_anthropic_verification.sh --mock
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
